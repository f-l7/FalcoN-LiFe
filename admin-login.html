<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FalcoN LiFe - تسجيل دخول المسؤولين</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <div class="container">
        <header>
            <h1>FalcoN LiFe - تسجيل دخول المسؤولين</h1>
        </header>
        
        <nav>
            <a href="index.html">الصفحة الرئيسية</a>
            <a href="identities.html">الهويات</a>
            <a href="create-identity.html">إنشاء هوية</a>
            <a href="admin-login.html" class="active admin-link">تسجيل دخول المسؤولين</a>
        </nav>
        
        <section id="admin-login">
            <div class="admin-login-box">
                <h2>تسجيل دخول المسؤولين</h2>
                <form id="adminLoginForm">
                    <div class="form-group">
                        <label for="username">اسم المستخدم:</label>
                        <input type="text" id="username" required>
                    </div>
                    
                    <div class="form-group">
                        <label for="password">كلمة المرور:</label>
                        <input type="password" id="password" required>
                    </div>
                    
                    <button type="submit">تسجيل الدخول</button>
                </form>
            </div>
        </section>
    </div>
    <script src="script.js"></script>
    <script>
        document.getElementById('adminLoginForm').addEventListener('submit', function(e) {
            e.preventDefault();
            adminLogin();
        });
    </script>
</body>
</html>
