<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FalcoN LiFe - لوحة المسؤولين</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <div class="container">
        <header>
            <h1>FalcoN LiFe - لوحة تحكم المسؤولين</h1>
        </header>
        
        <nav>
            <a href="index.html">الصفحة الرئيسية</a>
            <a href="identities.html">الهويات</a>
            <a href="create-identity.html">إنشاء هوية</a>
            <a href="#" id="logout" class="admin-link">تسجيل الخروج</a>
        </nav>
        
        <section id="admin-panel">
            <div class="admin-tabs">
                <button class="tab-btn active" data-tab="accepted">الهويات المقبولة</button>
                <button class="tab-btn" data-tab="pending">الهويات المعلقة</button>
                <button class="tab-btn" data-tab="rejected">الهويات المرفوضة</button>
            </div>
            
            <div class="admin-content">
                <div id="accepted-tab" class="tab-content active">
                    <h2>الهويات المقبولة</h2>
                    <div class="identities-container" id="acceptedIdentities">
                        <!-- سيتم ملء الهويات المقبولة بواسطة الجافاسكريبت -->
                    </div>
                </div>
                
                <div id="pending-tab" class="tab-content">
                    <h2>الهويات المعلقة</h2>
                    <div class="identities-container" id="pendingIdentities">
                        <!-- سيتم ملء الهويات المعلقة بواسطة الجافاسكريبت -->
                    </div>
                </div>
                
                <div id="rejected-tab" class="tab-content">
                    <h2>الهويات المرفوضة</h2>
                    <div class="identities-container" id="rejectedIdentities">
                        <!-- سيتم ملء الهويات المرفوضة بواسطة الجافاسكريبت -->
                    </div>
                </div>
            </div>
        </section>
    </div>
    <script src="script.js"></script>
    <script>
        document.addEventListener('DOMContentLoaded', function() {
            // تحميل الهويات عند فتح الصفحة
            loadAdminIdentities('accepted');
            
            // إضافة أحداث لأزرار التبويب
            document.querySelectorAll('.tab-btn').forEach(btn => {
                btn.addEventListener('click', function() {
                    const tabId = this.getAttribute('data-tab');
                    switchTab(tabId);
                    loadAdminIdentities(tabId);
                });
            });
            
            // حدث تسجيل الخروج
            document.getElementById('logout').addEventListener('click', function(e) {
                e.preventDefault();
                adminLogout();
            });
        });
    </script>
</body>
</html>
